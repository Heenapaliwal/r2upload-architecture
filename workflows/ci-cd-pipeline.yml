name: Enterprise CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  audit-and-test:
    name: Lint, Test & Security Audit
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testing
          POSTGRES_PASSWORD: testing
          POSTGRES_DB: testing
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
      - name: Security audit
        run: composer audit
      - name: Static Analysis
        run: vendor/bin/phpstan analyse --memory-limit=2G
      - name: Run Test Suite
        run: php artisan test

  build-and-push:
    name: Build & Push Immutable Image
    runs-on: ubuntu-latest
    needs: audit-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push API Container
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: ghcr.io/bizsafer/r2upload-api:latest

  deploy-production:
    name: Zero-Downtime Deploy via Kamal 2
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Install Kamal
        run: gem install kamal
      - name: Execute Rolling Deployment
        run: kamal deploy --skip-push
      - name: Health Check Validation
        run: |
          sleep 10
          curl -sf https://api.r2upload.io/health || exit 1
